        MÁY TÍNH TOÀN NĂNG OMNICALC v3.0 • PHÁT TRIỂN NĂM 2026
    </footer>

    <script>
        let display = document.getElementById('calc-display');
        let history = document.getElementById('calc-history');
        let levelTag = document.getElementById('current-level-tag');

        // CHUYỂN ĐỔI TAB CẤP ĐỘ HỌC TẬP
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('border-cyan-500', 'text-cyan-400');
                el.classList.add('border-transparent', 'text-slate-400');
            });

            document.getElementById(tabId).classList.add('active');
            let activeBtn = document.getElementById('tab-' + tabId);
            activeBtn.classList.remove('border-transparent', 'text-slate-400');
            activeBtn.classList.add('border-cyan-500', 'text-cyan-400');

            // Cập nhật nhãn trạng thái cấp độ
            if(tabId === 'level-basic') levelTag.innerText = "Tiểu học";
            if(tabId === 'level-junior') levelTag.innerText = "Trung học cơ sở";
            if(tabId === 'level-senior') levelTag.innerText = "Trung học phổ thông";
            if(tabId === 'level-university') levelTag.innerText = "Đại học / Tiến sĩ";
        }

        // TƯƠNG TÁC NHẬP DỮ LIỆU
        function input(value) {
            if (display.innerText === '0' && value !== '.' && !isOperator(value)) {
                display.innerText = value;
            } else {
                display.innerText += value;
            }
        }

        function isOperator(char) {
            return ['+', '-', '*', '/', '^'].includes(char);
        }

        function clearDisplay() {
            display.innerText = '0';
            history.innerText = '';
        }

        // TÍNH TOÁN LÕI (SỬ DỤNG MATH.JS CHO ĐỘ CHÍNH XÁC CAO)
        function calculate() {
            try {
                let expr = display.innerText;
                history.innerText = expr + " =";
                
                // Sử dụng Math.js để phân tích cú pháp biểu thức nâng cao bao gồm cả số phức hay ma trận
                let result = math.evaluate(expr);
                
                // Định dạng kết quả hiển thị cho đẹp nếu là số thập phân dài
                if (typeof result === 'number' && !Number.isInteger(result)) {
                    result = math.format(result, { precision: 10 });
                }
                
                display.innerText = result;
            } catch (error) {
                display.innerText = 'Lỗi cú pháp';
            }
        }

        // --- CÁC TÍNH NĂNG CHUYÊN SÂU THEO YÊU CẦU ---

        // 1. Giải phương trình bậc 2 (Cấp độ Lớp 9)
        function solveQuadratic() {
            let a = prompt("Nhập hệ số a:");
            let b = prompt("Nhập hệ số b:");
            let c = prompt("Nhập hệ số c:");
            if (a === null || b === null || c === null) return;
            
            try {
                let delta = b*b - 4*a*c;
                if (delta < 0) {
                    // Chức năng nâng cao cấp 3: Tính nghiệm số phức khi delta âm
                    let realPart = (-b / (2 * a)).toFixed(2);
                    let imagPart = (Math.sqrt(-delta) / (2 * a)).toFixed(2);
                    display.innerText = `x1 = ${realPart} + ${imagPart}i, x2 = ${realPart} - ${imagPart}i`;
                } else if (delta === 0) {
                    display.innerText = `Nghiệm kép x = ${-b / (2 * a)}`;
                } else {
                    let x1 = (-b + Math.sqrt(delta)) / (2 * a);
                    let x2 = (-b - Math.sqrt(delta)) / (2 * a);
                    display.innerText = `x1 = ${x1.toFixed(4)}, x2 = ${x2.toFixed(4)}`;
                }
                history.innerText = `${a}x² + ${b}x + ${c} = 0`;
            } catch (e) {
                display.innerText = "Lỗi nhập liệu";
            }
        }

        // 2. Đổi đơn vị (Cấp độ lớp 1-5)
        function toolConvertUnit() {
            let value = prompt("Nhập giá trị cần đổi (ví dụ: 5):");
            let from = prompt("Nhập đơn vị gốc (m, cm, kg, g):");
            let to = prompt("Nhập đơn vị muốn đổi sang (m, cm, kg, g):");
            if (!value || !from || !to) return;
            try {
                let result = math.evaluate(`${value} ${from} to ${to}`);
                display.innerText = `${result}`;
                history.innerText = `${value} ${from} ➔ ${to}`;
            } catch (e) {
                display.innerText = "Sai đơn vị!";
            }
        }

        // 3. Tìm ƯCLN & BCNN
        function toolGCDLCM() {
            let a = prompt("Nhập số thứ nhất:");
            let b = prompt("Nhập số thứ hai:");
            if (!a || !b) return;
            let gcdVal = math.gcd(parseInt(a), parseInt(b));
            let lcmVal = math.lcm(parseInt(a), parseInt(b));
            display.innerText = `ƯCLN: ${gcdVal} | BCNN: ${lcmVal}`;
            history.innerText = `GCD & LCM của (${a}, ${b})`;
        }

        // 4. Tính toán Định thức Ma trận (Cấp đại học)
        function calcMatrixDet() {
            let matrixStr = prompt("Nhập ma trận vuông dạng mảng (Ví dụ: [[1,2],[3,4]]):");
            if (!matrixStr) return;
            try {
                let matrix = JSON.parse(matrixStr);
                let det = math.det(matrix);
                display.innerText = `Det = ${det}`;
                history.innerText = `det(${matrixStr})`;
            } catch (e) {
                display.innerText = "Định dạng sai!";
            }
        }

        // 5. Tính Ma trận nghịch đảo
        function calcMatrixInvert() {
            let matrixStr = prompt("Nhập ma trận cần nghịch đảo (Ví dụ: [[1,2],[3,4]]):");
            if (!matrixStr) return;
            try {
                let matrix = JSON.parse(matrixStr);
                let inv = math.inv(matrix);
                display.innerText = JSON.stringify(inv);
                history.innerText = `inv(${matrixStr})`;
            } catch (e) {
                display.innerText = "Lỗi tính ma trận";
            }
        }

        // 6. Tính Đạo hàm (Cấp Đại học / Tiến sĩ)
        function calcDerivative() {
            let expr = prompt("Nhập hàm số cần tính đạo hàm theo x (Ví dụ: x^3 + 2x):");
            if (!expr) return;
            try {
                let derived = math.derivative(expr, 'x');
                display.innerText = derived.toString();
                history.innerText = `d/dx (${expr})`;
            } catch (e) {
                display.innerText = "Lỗi cú pháp hàm số!";
            }
        }

        // 7. Tính Tích phân xác định (Cấp Đại học / Tiến sĩ)
        function calcIntegral() {
            let expr = prompt("Nhập hàm số f(x) (Ví dụ: x^2):");
            let a = prompt("Nhập cận dưới a:");
            let b = prompt("Nhập cận trên b:");
            if (!expr || !a || !b) return;
            
            try {
                // Sử dụng phương pháp mô phỏng hình thang Riemann để tính tích phân số học trực tiếp
                let f = math.compile(expr);
                let steps = 1000;
                let h = (b - a) / steps;
                let sum = 0.5 * (f.evaluate({x: parseFloat(a)}) + f.evaluate({x: parseFloat(b)}));
                
                for (let i = 1; i < steps; i++) {
                    sum += f.evaluate({x: parseFloat(a) + i * h});
                }
                let result = sum * h;
                display.innerText = `${result.toFixed(6)}`;
                history.innerText = `∫ (${expr}) dx từ ${a} đến ${b}`;
            } catch (e) {
                display.innerText = "Lỗi tích phân!";
            }
        }

        // 8. Định lý Pythagore (Cấp 2)
        function toolPythagoras() {
            let a = prompt("Nhập độ dài cạnh góc vuông 1 (a):");
            let b = prompt("Nhập độ dài cạnh góc vuông 2 (b):");
            if (!a || !b) return;
            let c = Math.sqrt(a*a + b*b);
            display.innerText = `Cạnh huyền c = ${c.toFixed(4)}`;
            history.innerText = `√(${a}² + ${b}²)`;
        }

        // 9. Tích vô hướng Vector 3D (Cấp 3)
        function toolVectorDot() {
            let v1 = prompt("Nhập vectơ 1 dạng [x,y,z] (Ví dụ: [1,2,3]):");
            let v2 = prompt("Nhập vectơ 2 dạng [x,y,z] (Ví dụ: [4,5,6]):");
            if (!v1 || !v2) return;
            try {
                let vec1 = JSON.parse(v1);
                let vec2 = JSON.parse(v2);
                let dotProduct = math.dot(vec1, vec2);
                display.innerText = `Tích vô hướng = ${dotProduct}`;
                history.innerText = `${v1} • ${v2}`;
            } catch (e) {
                display.innerText = "Lỗi cấu trúc vectơ!";
            }
        }

        // 10. Hình học khối (Khối nón / cầu - Cấp 3)
        function toolGeometryCone() {
            let r = prompt("Nhập bán kính r:");
            if (!r) return;
            let vSphere = (4/3) * Math.PI * Math.pow(r, 3);
            display.innerText = `V (Cầu): ${vSphere.toFixed(3)}`;
            history.innerText = `Thể tích hình cầu bán kính r = ${r}`;
        }
    </script>
